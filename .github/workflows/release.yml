name: Release

on:
  push:
    branches: ['release/*']
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    environment: maven-central

    steps:
      - name: Determine mode
        id: mode
        run: |
          case "${{ github.event_name }}" in
            release)
              tag="${{ github.event.release.tag_name }}"
              if [[ ! "$tag" =~ ^release-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "::error::Release tag '$tag' must match 'release-X.Y.Z'"
                exit 1
              fi
              echo "mode=deploy" >> "$GITHUB_OUTPUT"
              echo "ref=$tag" >> "$GITHUB_OUTPUT"
              echo "expected_version=${tag#release-}" >> "$GITHUB_OUTPUT"
              ;;
            push)
              branch="${GITHUB_REF#refs/heads/}"
              if [[ ! "$branch" =~ ^release/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "::error::Release branch '$branch' must match 'release/X.Y.Z'"
                exit 1
              fi
              echo "mode=dry-run" >> "$GITHUB_OUTPUT"
              echo "ref=$branch" >> "$GITHUB_OUTPUT"
              echo "expected_version=${branch#release/}" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "mode=dry-run" >> "$GITHUB_OUTPUT"
              echo "ref=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
              # No expected_version — use whatever the POM says.
              ;;
            *)
              echo "::error::Unexpected event '${{ github.event_name }}'"
              exit 1
              ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.mode.outputs.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Resolve version
        id: version
        run: |
          pom_version=$(mvn -B -q -Dexpression=project.version -DforceStdout help:evaluate)
          expected="${{ steps.mode.outputs.expected_version }}"
          if [[ -n "$expected" && "$pom_version" != "$expected" ]]; then
            echo "::error::POM version '$pom_version' does not match '$expected'"
            exit 1
          fi
          echo "version=$pom_version" >> "$GITHUB_OUTPUT"

      - name: Dry run
        if: ${{ steps.mode.outputs.mode == 'dry-run' }}
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -P release verify -pl all -am

      - name: Deploy to Maven Central staging
        if: ${{ steps.mode.outputs.mode == 'deploy' }}
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -P release deploy -pl all -am

      - name: Summary
        run: |
          version="${{ steps.version.outputs.version }}"
          if [[ "${{ steps.mode.outputs.mode }}" == "dry-run" ]]; then
            {
              echo "### Dry run complete for \`$version\`"
              echo "Signed artifacts built locally; nothing uploaded."
              echo "When ready, cut a GitHub Release with tag \`release-$version\` to deploy."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Deployed \`$version\` to Central Portal staging"
              echo "Log in to https://central.sonatype.com to validate and promote the staged deployment."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
